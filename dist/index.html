<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Copycat Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=Roboto+Mono:wght@100..700&display=swap" rel="stylesheet">
  <script src="https://code.iconify.design/iconify-icon/2.3.0/iconify-icon.min.js"></script>
  <script type="module" crossorigin src="/assets/index-BItDpDTy.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-C9pHtzmc.css">
</head>
<body>
  <!-- 解析中オーバーレイ -->
  <div id="loading-overlay" class="hidden">
    <div class="loading-container">
      <div class="spinner"></div>
      <p>コードを解析中...</p>
    </div>
  </div>

  <!-- メインレイアウト -->
  <div id="editor-mode">
    <div class="editor-layout">
      <!-- 左ペイン：元コード -->
      <div class="pane left-pane">
        <div class="pane-header">
          <span class="pane-title">元コード</span>
          <button class="run-btn hidden" data-pane="left">&#9654; 実行</button>
        </div>
        <div class="pane-body">
          <div id="left-editor" class="editor-area"></div>
          <button id="start-btn" class="start-floating-btn">開始</button>
          <div class="inline-preview hidden" data-pane="left">
            <div class="preview-error-inline hidden"></div>
            <iframe class="inline-preview-frame"></iframe>
          </div>
        </div>
        <div id="explanation" class="explanation hidden"></div>
        <div class="step-nav hidden">
          <button id="prev-btn" class="nav-btn" disabled>&#9664; 前へ</button>
          <span id="step-indicator">Step 1 / 1</span>
          <button id="next-btn" class="nav-btn">次へ &#9654;</button>
          <button id="finish-btn" class="primary-btn hidden">完了</button>
        </div>
      </div>

      <!-- 右ペイン：写経用 -->
      <div class="pane right-pane">
        <div class="pane-header">
          <span class="pane-title">写経スペース</span>
          <div class="pane-header-actions hidden" id="right-pane-actions">
            <button id="check-btn" class="check-btn">&#10003; チェック</button>
            <button class="run-btn" data-pane="right">&#9654; 実行</button>
          </div>
        </div>
        <div class="pane-body">
          <div id="right-editor" class="editor-area"></div>
          <div class="inline-preview hidden" data-pane="right">
            <div class="preview-error-inline hidden"></div>
            <iframe class="inline-preview-frame"></iframe>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- フッター -->
  <footer id="footer">
    <span id="code-type-badge" class="code-type-badge hidden"></span>
    <button id="settings-btn" class="footer-settings-btn" aria-label="Settings">
      <iconify-icon icon="lucide:settings" width="18" height="18"></iconify-icon>
    </button>
  </footer>

  <!-- フィードバックモーダル -->
  <div id="feedback-modal" class="modal hidden">
    <div class="modal-content feedback-modal-content">
      <h2>コーディング体験のフィードバック</h2>
      <p class="feedback-subtitle">この写経体験はいかがでしたか？</p>

      <div class="feedback-section">
        <label>評価</label>
        <div class="star-rating" id="star-rating">
          <button class="star" data-value="1">&#9733;</button>
          <button class="star" data-value="2">&#9733;</button>
          <button class="star" data-value="3">&#9733;</button>
          <button class="star" data-value="4">&#9733;</button>
          <button class="star" data-value="5">&#9733;</button>
        </div>
      </div>

      <div class="feedback-section">
        <label for="feedback-text">コメント（任意）</label>
        <textarea id="feedback-text" placeholder="ステップの分け方、解説のわかりやすさなど..."></textarea>
      </div>

      <div class="modal-actions">
        <button id="send-feedback-btn" class="primary-btn" disabled>送信</button>
        <button id="skip-feedback-btn" class="secondary-btn">スキップ</button>
      </div>
    </div>
  </div>

  <!-- Settingsモーダル -->
  <div id="settings-modal" class="modal hidden">
    <div class="modal-content">
      <h2>Settings</h2>
      <label for="provider-select">APIプロバイダー</label>
      <select id="provider-select">
        <option value="anthropic">Anthropic (Claude)</option>
        <option value="gemini">Google (Gemini)</option>
        <option value="openai">OpenAI (ChatGPT)</option>
      </select>
      <label for="model-select">モデル</label>
      <select id="model-select"></select>
      <div id="anthropic-key-group">
        <label for="api-key-input">Anthropic API Key</label>
        <input type="password" id="api-key-input" placeholder="sk-ant-..." />
      </div>
      <div id="gemini-key-group" class="hidden">
        <label for="gemini-key-input">Gemini API Key</label>
        <input type="password" id="gemini-key-input" placeholder="AIza..." />
      </div>
      <div id="openai-key-group" class="hidden">
        <label for="openai-key-input">OpenAI API Key</label>
        <input type="password" id="openai-key-input" placeholder="sk-..." />
      </div>
      <div class="modal-actions">
        <button id="save-key-btn" class="primary-btn">保存</button>
        <button id="close-modal-btn" class="secondary-btn">閉じる</button>
      </div>
    </div>
  </div>

</body>
</html>
